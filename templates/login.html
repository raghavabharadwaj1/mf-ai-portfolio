<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MF AI | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md border-t-8 border-green-600">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-gray-800">MF <span class="text-green-600">AI</span> Portfolio</h2>
            <p class="text-gray-500 mt-2">Manage your wealth with intelligence</p>
        </div>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-600 uppercase tracking-wider">Email Address</label>
                <input type="email" name="email" required placeholder="name@company.com" 
                       class="w-full px-4 py-3 mt-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 uppercase tracking-wider">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full px-4 py-3 mt-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-1">
                Sign In to Dashboard
            </button>
        </form>
        
            </div>
</body>
</html>
